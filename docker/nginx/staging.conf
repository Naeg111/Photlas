# Staging Nginx Configuration - test.photlas.jp
# Reverse Proxy behind CloudFront (SSL terminated at CloudFront)

# サーバーバージョン非公開
server_tokens off;

server {
    listen 80;
    server_name test.photlas.jp localhost;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.cloudfront.net https://*.googleapis.com https://*.gstatic.com https://*.s3.ap-northeast-1.amazonaws.com; connect-src 'self' https://maps.googleapis.com https://*.sentry.io https://*.cloudfront.net https://*.s3.ap-northeast-1.amazonaws.com; frame-src 'none'; object-src 'none'; base-uri 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Frontend (React SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Health check endpoint
    location /nginx-health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
