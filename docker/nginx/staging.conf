# Staging Nginx Configuration - test.photlas.jp
# Reverse Proxy behind CloudFront (SSL terminated at CloudFront)

# サーバーバージョン非公開
server_tokens off;

# OGPクローラー判定（map はserver外で定義）
map $http_user_agent $is_ogp_crawler {
    default                 0;
    ~*Twitterbot            1;
    ~*facebookexternalhit   1;
    ~*Googlebot             1;
    ~*line-poker            1;
    ~*Slackbot              1;
    ~*Discordbot            1;
}

server {
    listen 80;
    server_name test.photlas.jp localhost;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://*.cloudfront.net https://*.mapbox.com https://*.s3.ap-northeast-1.amazonaws.com; connect-src 'self' https://test-api.photlas.jp https://*.mapbox.com https://events.mapbox.com https://www.google-analytics.com https://*.sentry.io https://*.cloudfront.net https://*.s3.ap-northeast-1.amazonaws.com; frame-src 'none'; object-src 'none'; base-uri 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # ステージングは検索エンジンにインデックスさせない。robots.txt の Allow と組み合わせ、
    # クロールは許可しつつ noindex 指示で検索結果から除外させる（既存インデックスの de-index も促進）
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ステージング環境の robots.txt。
    # 当初は Disallow: / でクロール自体を禁止していたが、それだと Google が
    # X-Robots-Tag: noindex を読めず、既存インデックスが消えない問題があった。
    # 現在は Allow: / でクロールを許可し、noindex ヘッダ（上記 add_header）で
    # 検索結果からの除外を指示する方式に変更（2026-05-06）。
    location = /robots.txt {
        return 200 "User-agent: *\nAllow: /\n";
        add_header Content-Type text/plain;
    }

    # Issue#58: OGPクローラー振り分け（map + error_page + named locationパターン）
    location ~ ^/photo-viewer/(\d+)$ {
        set $photo_id $1;

        if ($is_ogp_crawler = "1") {
            return 418;
        }
        error_page 418 = @ogp_proxy;

        # 一般ユーザー → フロントエンド
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # OGPクローラー → バックエンドOGPエンドポイント
    location @ogp_proxy {
        internal;
        proxy_pass http://backend:8080/api/v1/ogp/photo/$photo_id;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Frontend (React SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Health check endpoint
    location /nginx-health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
