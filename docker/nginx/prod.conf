# Production Nginx Configuration - photlas.jp
# SSL/TLS + Reverse Proxy

# サーバーバージョン非公開
server_tokens off;

# OGPクローラー判定（map はserver外で定義）
map $http_user_agent $is_ogp_crawler {
    default                 0;
    ~*Twitterbot            1;
    ~*facebookexternalhit   1;
    ~*Googlebot             1;
    ~*line-poker            1;
    ~*Slackbot              1;
    ~*Discordbot            1;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name photlas.jp www.photlas.jp;
    return 301 https://$host$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name photlas.jp www.photlas.jp;

    # SSL Certificate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/photlas.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/photlas.jp/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://*.cloudfront.net https://*.mapbox.com https://*.s3.ap-northeast-1.amazonaws.com; connect-src 'self' https://api.photlas.jp https://*.mapbox.com https://events.mapbox.com https://www.google-analytics.com https://*.sentry.io https://*.cloudfront.net https://*.s3.ap-northeast-1.amazonaws.com; frame-src 'none'; object-src 'none'; base-uri 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Issue#58: OGPクローラー振り分け（map + error_page + named locationパターン）
    location ~ ^/photo-viewer/(\d+)$ {
        set $photo_id $1;

        if ($is_ogp_crawler = "1") {
            return 418;
        }
        error_page 418 = @ogp_proxy;

        # 一般ユーザー → フロントエンド
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real_IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OGPクローラー → バックエンドOGPエンドポイント
    location @ogp_proxy {
        internal;
        proxy_pass http://backend:8080/api/v1/ogp/photo/$photo_id;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (React SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /nginx-health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
