# Production Nginx Configuration - photlas.jp
# SSL/TLS + Reverse Proxy

# サーバーバージョン非公開
server_tokens off;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name photlas.jp www.photlas.jp;
    return 301 https://$host$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name photlas.jp www.photlas.jp;

    # SSL Certificate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/photlas.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/photlas.jp/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.cloudfront.net https://*.googleapis.com https://*.gstatic.com https://*.s3.ap-northeast-1.amazonaws.com; connect-src 'self' https://maps.googleapis.com https://*.sentry.io https://*.cloudfront.net https://*.s3.ap-northeast-1.amazonaws.com; frame-src 'none'; object-src 'none'; base-uri 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Issue#58: OGPクローラー振り分け
    # /photo-viewer/{photoId} へのクローラーアクセスをバックエンドOGPエンドポイントにプロキシ
    location ~ ^/photo-viewer/(\d+)$ {
        if ($http_user_agent ~* "(Twitterbot|facebookexternalhit|Googlebot|LINE|Slackbot|Discordbot)") {
            rewrite ^/photo-viewer/(\d+)$ /api/v1/ogp/photo/$1 break;
            proxy_pass http://backend:8080;
        }
        # 一般ユーザー → フロントエンド（SPAのindex.htmlを返す）
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (React SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /nginx-health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
