# Production Docker Compose - photlas.jp
# ECRからイメージを取得してデプロイ

services:
  # React Frontend
  frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/photlas-frontend:${IMAGE_TAG:-latest}
    container_name: photlas-frontend-prod
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - photlas-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Spring Boot Backend
  backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/photlas-backend:${IMAGE_TAG:-latest}
    container_name: photlas-backend-prod
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${DATABASE_URL}
      - SPRING_DATASOURCE_USERNAME=${DATABASE_USER}
      - SPRING_DATASOURCE_PASSWORD=${DATABASE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_REGION=${AWS_REGION}
      - AWS_CLOUDFRONT_DOMAIN=${AWS_CLOUDFRONT_DOMAIN:-}
      - SMTP_HOST=${SMTP_HOST:-email-smtp.ap-northeast-1.amazonaws.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - MODERATION_API_KEY=${MODERATION_API_KEY}
      - APP_FRONTEND_URL=https://photlas.jp
      # Issue#81: OAuth 2.0 Client credentials (Google / LINE) + access_token 暗号化鍵
      # Hotfix: Spring Boot の ${VAR:default} は VAR が空文字だと default を使わないため、
      # docker-compose 側で非空プレースホルダーをデフォルトに設定する。
      # 実 OAuth 利用時はホスト env var で上書き。
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-placeholder-google-id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-placeholder-google-secret}
      - LINE_CLIENT_ID=${LINE_CLIENT_ID:-placeholder-line-id}
      - LINE_CLIENT_SECRET=${LINE_CLIENT_SECRET:-placeholder-line-secret}
      - OAUTH_ENCRYPTION_KEY_BASE64=${OAUTH_ENCRYPTION_KEY_BASE64:-}
      - PHOTLAS_OAUTH_ENABLED=${PHOTLAS_OAUTH_ENABLED:-false}
    networks:
      - photlas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-ap-northeast-1}
        awslogs-group: /photlas/prod/backend
        tag: "{{.Name}}"
        awslogs-create-group: "true"

  # Issue#136 §9.3.5 / #58 §6.3: リバースプロキシ nginx は撤去。
  # 配信は CloudFront -> S3（静的）/ ALB -> backend:8080（/api,/tags,/photo-viewer）。
  # nginx には CloudFront/ALB のどちらからもトラフィックが届かないため死蔵だった。
  # TLS も CloudFront の ACM 証明書で終端するため Let's Encrypt/certbot も不要。

networks:
  photlas-network:
    driver: bridge
