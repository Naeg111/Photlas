spring.application.name=photlas-backend

# Database Configuration (H2 for development/testing)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.format-sql=true

# H2 Console (for development only)
# Issue#23: 本番環境ではapplication-docker.propertiesで無効化
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
# Issue#23: JWT Secretを環境変数化
# 本番・ステージング: JWT_SECRET環境変数で上書き
# 開発・CI: デフォルト値を使用（本番では使用されない）
jwt.secret=${JWT_SECRET:devOnlyDefaultKeyForLocalAndCITestingPurposes}
jwt.expiration=86400000

# Mail Configuration (for testing - using mock)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
# Issue#113: 多言語メール本文の文字化け防止のため UTF-8 を明示
spring.mail.default-encoding=UTF-8

# Flyway（開発環境ではH2+ddl-autoを使用するため無効）
spring.flyway.enabled=false

# AWS S3 Configuration
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:photlas-dev}
aws.s3.region=${AWS_REGION:ap-northeast-1}
aws.s3.cloudfront-domain=${AWS_CLOUDFRONT_DOMAIN:}

# Issue#119: AWS Rekognition Configuration
aws.rekognition.region=${AWS_REGION:ap-northeast-1}

# Issue#119: multipart アップロードの上限（POST /api/v1/photos/analyze 用）
# トリミング後の JPEG（典型 1〜3MB、最大 5MB 想定）を余裕持って受けられるよう 10MB に設定
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# メール送信元アドレス
app.mail.from=${APP_MAIL_FROM:Photlas <noreply@photlas.jp>}

# フロントエンド・バックエンドURL
app.frontend-url=${APP_FRONTEND_URL:https://photlas.jp}
app.backend-url=${APP_BACKEND_URL:https://api.photlas.jp}

# Issue#81: OAuth access_token 暗号化鍵（AES-256-GCM 用、Base64 エンコードされた 32 バイト）
# 本番・ステージング: 環境変数 OAUTH_ENCRYPTION_KEY_BASE64 で上書き（必須）
# 開発・CI: 下記のデフォルト値を使用（本番では使用されない）
photlas.oauth.encryption-key-base64=${OAUTH_ENCRYPTION_KEY_BASE64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

# Issue#81: OAuth2 ログイン機能の有効化（デフォルト OFF）
# ローカル開発: OFF のまま（実プロバイダー動作確認はステージングで実施）
# 本番・ステージング: application-{prod,staging}.properties で true に上書き
photlas.oauth.enabled=${PHOTLAS_OAUTH_ENABLED:false}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Issue#95: トレース ID（MDC"traceId"）をログレベル列に埋め込む。未設定時は no-trace を表示
logging.pattern.level=%5p [%X{traceId:-no-trace}]
