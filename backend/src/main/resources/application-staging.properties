# Staging環境用設定
# PostgreSQL接続設定（環境変数から取得）

# データベース接続設定
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate設定
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway設定（既存DBをV1でベースライン）
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.ignore-migration-patterns=*:missing

# H2コンソールを無効化
spring.h2.console.enabled=false

# ログ設定（ステージング環境用）
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.photlas=DEBUG

# セキュリティ設定
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# サーバー設定
server.port=8080
server.servlet.context-path=

# アクチュエータ設定
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# AWS S3設定
aws.s3.bucket-name=${AWS_S3_BUCKET}
aws.s3.region=${AWS_REGION:ap-northeast-1}
aws.s3.cloudfront-domain=${AWS_CLOUDFRONT_DOMAIN:}

# レート制限設定（1分あたり、Issue#95 で sensitive 新設）
rate-limit.auth=60
rate-limit.sensitive=20
rate-limit.photo=100
rate-limit.general=200

# メール設定（SES SMTP）
spring.mail.host=${SMTP_HOST:email-smtp.ap-northeast-1.amazonaws.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# モデレーションAPIキー（Lambda→バックエンド認証用）
moderation.api-key=${MODERATION_API_KEY:}

# CORS設定（ステージング環境）
cors.allowed-origins=https://test.photlas.jp,http://localhost:5173,http://localhost:3000

# ===== Issue#81: OAuth2 ログイン =====

# OAuth2 機能の有効化
# Hotfix: Secrets が未設定のうちはデフォルト false で安全側に倒す（環境変数 PHOTLAS_OAUTH_ENABLED=true で有効化）
photlas.oauth.enabled=${PHOTLAS_OAUTH_ENABLED:false}

# ALB 越しの HTTPS 判定のため必須。
server.forward-headers-strategy=framework

# Safari ITP / SameSite Cookie 対策。
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=true

# Google OAuth2 Client
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/v1/auth/oauth2/callback/google

# LINE OAuth2 Client
spring.security.oauth2.client.registration.line.client-id=${LINE_CLIENT_ID:}
spring.security.oauth2.client.registration.line.client-secret=${LINE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.line.scope=profile,openid,email
spring.security.oauth2.client.registration.line.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.line.redirect-uri={baseUrl}/api/v1/auth/oauth2/callback/line
spring.security.oauth2.client.registration.line.client-authentication-method=client_secret_post

# LINE Provider（Spring Boot 組み込みではないため手動定義）
spring.security.oauth2.client.provider.line.authorization-uri=https://access.line.me/oauth2/v2.1/authorize
spring.security.oauth2.client.provider.line.token-uri=https://api.line.me/oauth2/v2.1/token
spring.security.oauth2.client.provider.line.user-info-uri=https://api.line.me/v2/profile
spring.security.oauth2.client.provider.line.user-name-attribute=userId

# access_token 暗号化鍵（AES-256-GCM 用、Base64 エンコード 32 バイト）
# Hotfix: OAuth 無効時は @ConditionalOnProperty で OAuthConfig が skip されるため、
# 本プロパティは参照されない。念のため空文字デフォルトを設けて placeholder 未解決例外を防ぐ。
# OAuth 有効化時 (PHOTLAS_OAUTH_ENABLED=true) は OAUTH_ENCRYPTION_KEY_BASE64 の設定が必須。
photlas.oauth.encryption-key-base64=${OAUTH_ENCRYPTION_KEY_BASE64:}
