# Photlas 메일 템플릿（한국어）
# 번역 출처: Claude (기계 번역)
# 주의: 네이티브 품질 검토 미실시. 오역・부자연스러운 표현을 발견하면 본 파일을 직접 수정해 주세요.
#
# 중요: MessageFormat 특수 문자 이스케이프
#   ' (작은따옴표)  → '' 로 두 번 쓰기
#   { } (중괄호)    → '{' '}' 로 따옴표로 감싸기

# 공통 서명
email.signature=Photlas\nsupport@photlas.jp

# 메일 인증 링크 (AuthService.sendVerificationEmail)
email.verification.subject=[Photlas] 이메일 주소 인증
email.verification.body=\
{0} 님\n\n\
Photlas 가입을 환영합니다!\n\
아래 링크를 클릭하여 이메일 주소를 인증해 주세요.\n\n\
{1}\n\n\
이 링크는 24시간 동안 유효합니다.\n\n\
회원님이 가입을 신청하지 않았다면 이 메일을 무시해 주세요.

# 비밀번호 재설정 (PasswordService.sendPasswordResetEmail)
email.passwordReset.subject=[Photlas] 비밀번호 재설정
email.passwordReset.body=\
비밀번호 재설정 요청을 접수했습니다.\n\n\
아래 링크를 클릭하여 비밀번호를 재설정해 주세요:\n\
{0}\n\n\
이 링크는 30분 동안 유효합니다.\n\n\
회원님이 요청하지 않았다면 이 메일을 무시해 주세요.

# 비밀번호 변경 완료 알림 (PasswordService.sendPasswordChangedNotification)
email.passwordChanged.subject=[Photlas] 비밀번호가 변경되었습니다
email.passwordChanged.body=\
{0} 님\n\n\
회원님 계정의 비밀번호가 변경되었습니다.\n\n\
이 변경에 대해 알지 못하시는 경우, 즉시 아래 이메일로 연락해 주세요.\n\
support@photlas.jp

# 이메일 주소 변경 확인 링크 (AccountService.requestEmailChange, 새 주소로)
email.emailChangeConfirm.subject=[Photlas] 이메일 주소 변경 확인
email.emailChangeConfirm.body=\
{0} 님\n\n\
이메일 주소 변경 요청을 접수했습니다.\n\
아래 링크를 클릭하여 변경을 확정해 주세요:\n\n\
{1}\n\n\
이 링크는 30분 동안 유효합니다.\n\n\
회원님이 요청하지 않았다면 이 메일을 무시해 주세요.

# 이메일 주소 변경 알림 (AccountService.requestEmailChange, 이전 주소로)
email.emailChangeNotifyOld.subject=[Photlas] 이메일 주소 변경이 요청되었습니다
email.emailChangeNotifyOld.body=\
{0} 님\n\n\
회원님 계정에 대해 이메일 주소 변경이 요청되었습니다.\n\n\
회원님이 요청하지 않으셨다면, 즉시 비밀번호를 변경해 주세요.

# 계정 삭제 완료 알림 NORMAL (비밀번호 설정 + OAuth 연동 없음)
email.accountDeletion.normal.subject=[Photlas] 계정 삭제 확인
email.accountDeletion.normal.body=\
{0} 님\n\n\
계정 삭제가 완료되었습니다.\n\n\
회원님의 데이터는 90일 동안 보존됩니다. 90일 경과 후 모든 데이터가 완전히 삭제됩니다.\n\n\
계정을 복구하려면 90일 이내에 이메일 주소와 비밀번호로 로그인해 주세요.\n\n\
이 작업에 대해 알지 못하시는 경우, 즉시 아래로 연락해 주세요.\n\
support@photlas.jp

# 계정 삭제 완료 알림 HYBRID (비밀번호 설정 + OAuth 연동 있음)
email.accountDeletion.hybrid.subject=[Photlas] 계정 삭제 확인
email.accountDeletion.hybrid.body=\
{0} 님\n\n\
계정 삭제가 완료되었습니다.\n\n\
회원님의 데이터는 90일 동안 보존됩니다. 90일 경과 후 모든 데이터가 완전히 삭제됩니다.\n\n\
계정을 복구하려면 90일 이내에 이메일 주소와 비밀번호, 또는 {1} 으로 다시 로그인해 주세요.\n\n\
이 작업에 대해 알지 못하시는 경우, 즉시 아래로 연락해 주세요.\n\
support@photlas.jp

# 계정 삭제 완료 알림 OAUTH_ONLY (비밀번호 미설정 + OAuth 연동만)
email.accountDeletion.oauthOnly.subject=[Photlas] 계정 삭제 확인
email.accountDeletion.oauthOnly.body=\
{0} 님\n\n\
계정 삭제가 완료되었습니다.\n\n\
회원님의 데이터는 90일 동안 보존됩니다. 90일 경과 후 모든 데이터가 완전히 삭제됩니다.\n\n\
계정을 복구하려면 90일 이내에 {1} 으로 다시 로그인해 주세요.\n\n\
이 작업에 대해 알지 못하시는 경우, 즉시 아래로 연락해 주세요.\n\
support@photlas.jp

# 사진 격리 알림 (ModerationNotificationService.sendQuarantineNotification)
# {0}=username, {1}=createdAt
email.moderationQuarantine.subject=[Photlas] 게시물 검토 안내
email.moderationQuarantine.body=\
{0} 님\n\n\
게시하신 사진({1} 게시)에 대해 콘텐츠 정책에 따른 검토가 필요한 것으로 판단되었습니다.\n\n\
현재 운영 팀이 확인 중입니다. 검토 결과 문제가 없는 것으로 판단되면 자동으로 공개됩니다.\n\n\
검토는 통상 1~2 영업일 정도 소요됩니다.\n\
문의 사항이 있으시면 연락해 주세요.

# 콘텐츠 정책 위반 경고 (ModerationNotificationService.sendWarningNotification)
# {0}=username, {1}=reason
email.moderationWarning.subject=[Photlas] 콘텐츠 정책 위반 경고
email.moderationWarning.body=\
{0} 님\n\n\
게시하신 콘텐츠가 콘텐츠 정책을 위반한 것으로 판단되어 해당 게시물을 삭제했습니다.\n\n\
위반 사유: {1}\n\n\
이는 경고입니다. 향후 동일한 위반이 반복되는 경우, 게시 기능 정지나 계정 정지 등의 조치를 취할 수 있습니다.\n\n\
콘텐츠 정책의 자세한 내용은 이용약관을 확인해 주세요.

# 게시 기능 일시 정지 알림 (ModerationNotificationService.sendTemporarySuspensionNotification)
# {0}=username, {1}=reason, {2}=suspendedUntil
email.moderationSuspension.subject=[Photlas] 게시 기능 일시 정지 안내
email.moderationSuspension.body=\
{0} 님\n\n\
콘텐츠 정책에 대한 다회 위반이 확인되어 게시 기능을 일시적으로 정지했습니다.\n\n\
위반 사유: {1}\n\
정지 기간: {2} 까지\n\n\
정지 기간 동안에는 사진 게시가 불가능하지만, 열람 등 기타 기능은 이용하실 수 있습니다.\n\n\
정지 기간이 종료되면 자동으로 게시 기능이 복구됩니다.\n\
문의 사항이 있으시면 연락해 주세요.

# 계정 영구 정지 알림 (ModerationNotificationService.sendPermanentSuspensionNotification)
# {0}=username, {1}=reason
email.moderationPermanentBan.subject=[Photlas] 계정 영구 정지 안내
email.moderationPermanentBan.body=\
{0} 님\n\n\
콘텐츠 정책에 대한 반복적 위반이 확인되어 계정을 영구 정지했습니다.\n\n\
위반 사유: {1}\n\n\
이 조치로 인해 향후 본 서비스 로그인 및 모든 기능 이용이 불가능합니다.\n\
또한 공개 중인 게시물은 모두 비공개로 전환됩니다.\n\n\
이 조치에 대한 이의가 있으신 경우, support@photlas.jp 로 연락해 주세요.

# 촬영 장소 지적 알림 (LocationSuggestionService.sendSuggestionNotification, 사진 게시자용)
# {0}=ownerUsername, {1}=reviewLink
email.locationSuggestion.subject=[Photlas] 촬영 장소에 대한 지적이 있습니다
email.locationSuggestion.body=\
{0} 님\n\n\
회원님이 게시한 사진에 대해 촬영 장소 지적이 있었습니다.\n\n\
아래 링크에서 지적 내용을 확인하시고, 수락 또는 거부를 결정해 주세요:\n\
{1}

# 촬영 장소 지적 수락 알림 (LocationSuggestionService.sendAcceptanceNotification, 지적자용)
# {0}=photoLink
email.locationSuggestionAccepted.subject=[Photlas] 촬영 장소 지적이 수락되었습니다
email.locationSuggestionAccepted.body=\
촬영 장소 지적이 게시자에게 수락되었습니다.\n\n\
대상 게시물은 다음 링크에서 확인하실 수 있습니다.\n\
{0}\n\n\
협력해 주셔서 감사합니다.

# 촬영 장소 지적 거부 알림 (LocationSuggestionService.sendRejectionNotification, 지적자용)
email.locationSuggestionRejected.subject=[Photlas] 촬영 장소 지적에 대해
email.locationSuggestionRejected.body=\
촬영 장소 지적에 대해, 게시자가 지적을 수락하지 않았습니다.
