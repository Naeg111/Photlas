# Photlas 메일 템플릿（한국어）
# 번역 출처: Claude (기계 번역)
# 주의: 네이티브 품질 검토 미실시. 오역・부자연스러운 표현을 발견하면 본 파일을 직접 수정해 주세요.
#
# 중요: MessageFormat 특수 문자 이스케이프
#   ' (작은따옴표)  → '' 로 두 번 쓰기
#   { } (중괄호)    → '{' '}' 로 따옴표로 감싸기

# 공통 서명
email.signature=Photlas\nsupport@photlas.jp

# 메일 인증 링크 (AuthService.sendVerificationEmail)
email.verification.subject=[Photlas] 이메일 주소 인증
email.verification.body=\
{0} 님\n\n\
Photlas 가입을 환영합니다!\n\
아래 링크를 클릭하여 이메일 주소를 인증해 주세요.\n\n\
{1}\n\n\
이 링크는 24시간 동안 유효합니다.\n\n\
회원님이 가입을 신청하지 않았다면 이 메일을 무시해 주세요.

# 비밀번호 재설정 (PasswordService.sendPasswordResetEmail)
email.passwordReset.subject=[Photlas] 비밀번호 재설정
email.passwordReset.body=\
비밀번호 재설정 요청을 접수했습니다.\n\n\
아래 링크를 클릭하여 비밀번호를 재설정해 주세요:\n\
{0}\n\n\
이 링크는 30분 동안 유효합니다.\n\n\
회원님이 요청하지 않았다면 이 메일을 무시해 주세요.

# 비밀번호 변경 완료 알림 (PasswordService.sendPasswordChangedNotification)
email.passwordChanged.subject=[Photlas] 비밀번호가 변경되었습니다
email.passwordChanged.body=\
{0} 님\n\n\
회원님 계정의 비밀번호가 변경되었습니다.\n\n\
이 변경에 대해 알지 못하시는 경우, 즉시 아래 이메일로 연락해 주세요.\n\
support@photlas.jp

# 이메일 주소 변경 확인 링크 (AccountService.requestEmailChange, 새 주소로)
email.emailChangeConfirm.subject=[Photlas] 이메일 주소 변경 확인
email.emailChangeConfirm.body=\
{0} 님\n\n\
이메일 주소 변경 요청을 접수했습니다.\n\
아래 링크를 클릭하여 변경을 확정해 주세요:\n\n\
{1}\n\n\
이 링크는 30분 동안 유효합니다.\n\n\
회원님이 요청하지 않았다면 이 메일을 무시해 주세요.

# 이메일 주소 변경 알림 (AccountService.requestEmailChange, 이전 주소로)
email.emailChangeNotifyOld.subject=[Photlas] 이메일 주소 변경이 요청되었습니다
email.emailChangeNotifyOld.body=\
{0} 님\n\n\
회원님 계정에 대해 이메일 주소 변경이 요청되었습니다.\n\n\
회원님이 요청하지 않으셨다면, 즉시 비밀번호를 변경해 주세요.

# 계정 삭제 완료 알림 NORMAL (비밀번호 설정 + OAuth 연동 없음)
email.accountDeletion.normal.subject=[Photlas] 계정 삭제 확인
email.accountDeletion.normal.body=\
{0} 님\n\n\
계정 삭제가 완료되었습니다.\n\n\
회원님의 데이터는 90일 동안 보존됩니다. 90일 경과 후 모든 데이터가 완전히 삭제됩니다.\n\n\
계정을 복구하려면 90일 이내에 이메일 주소와 비밀번호로 로그인해 주세요.\n\n\
이 작업에 대해 알지 못하시는 경우, 즉시 아래로 연락해 주세요.\n\
support@photlas.jp

# 계정 삭제 완료 알림 HYBRID (비밀번호 설정 + OAuth 연동 있음)
email.accountDeletion.hybrid.subject=[Photlas] 계정 삭제 확인
email.accountDeletion.hybrid.body=\
{0} 님\n\n\
계정 삭제가 완료되었습니다.\n\n\
회원님의 데이터는 90일 동안 보존됩니다. 90일 경과 후 모든 데이터가 완전히 삭제됩니다.\n\n\
계정을 복구하려면 90일 이내에 이메일 주소와 비밀번호, 또는 {1} 으로 다시 로그인해 주세요.\n\n\
이 작업에 대해 알지 못하시는 경우, 즉시 아래로 연락해 주세요.\n\
support@photlas.jp

# 계정 삭제 완료 알림 OAUTH_ONLY (비밀번호 미설정 + OAuth 연동만)
email.accountDeletion.oauthOnly.subject=[Photlas] 계정 삭제 확인
email.accountDeletion.oauthOnly.body=\
{0} 님\n\n\
계정 삭제가 완료되었습니다.\n\n\
회원님의 데이터는 90일 동안 보존됩니다. 90일 경과 후 모든 데이터가 완전히 삭제됩니다.\n\n\
계정을 복구하려면 90일 이내에 {1} 으로 다시 로그인해 주세요.\n\n\
이 작업에 대해 알지 못하시는 경우, 즉시 아래로 연락해 주세요.\n\
support@photlas.jp
