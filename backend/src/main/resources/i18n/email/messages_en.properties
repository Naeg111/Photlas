# Photlas email templates (English)
# Base language: ported from existing inline strings (AuthService etc.)
#
# IMPORTANT: MessageFormat special character escaping
#   ' (single quote) -> write as '' (doubled)
#   { } (braces)     -> wrap in single quotes: '{' '}'

# Common signature
email.signature=Photlas Team\nsupport@photlas.jp

# Email verification link (AuthService.sendVerificationEmail)
email.verification.subject=[Photlas] Email Verification
email.verification.body=\
Hi {0},\n\n\
Thank you for registering with Photlas!\n\
Please click the link below to verify your email address:\n\n\
{1}\n\n\
This link will expire in 24 hours.\n\n\
If you did not create an account, please ignore this email.

# Password reset (PasswordService.sendPasswordResetEmail)
email.passwordReset.subject=[Photlas] Password Reset
email.passwordReset.body=\
We received a request to reset your password.\n\n\
Please click the link below to reset your password:\n\
{0}\n\n\
This link will expire in 30 minutes.\n\n\
If you did not request this, please ignore this email.

# Password changed notification (PasswordService.sendPasswordChangedNotification)
email.passwordChanged.subject=[Photlas] Password Changed
email.passwordChanged.body=\
Hi {0},\n\n\
Your account password has been changed.\n\n\
If you did not make this change, please contact us immediately at:\n\
support@photlas.jp

# Email change confirmation link (AccountService.requestEmailChange, sent to new address)
email.emailChangeConfirm.subject=[Photlas] Email Change Confirmation
email.emailChangeConfirm.body=\
Hi {0},\n\n\
We received a request to change your email address.\n\
Please click the link below to confirm the change:\n\n\
{1}\n\n\
This link will expire in 30 minutes.\n\n\
If you did not request this, please ignore this email.

# Email change notification (AccountService.requestEmailChange, sent to old address)
email.emailChangeNotifyOld.subject=[Photlas] Email Change Requested
email.emailChangeNotifyOld.body=\
Hi {0},\n\n\
An email address change has been requested for your account.\n\n\
If you did not make this request, please change your password immediately.

# Account deletion confirmation NORMAL (password user, no OAuth)
email.accountDeletion.normal.subject=[Photlas] Account Deletion Confirmation
email.accountDeletion.normal.body=\
Hi {0},\n\n\
Your account has been deleted.\n\n\
Your data will be retained for 90 days. After that, all data will be permanently deleted.\n\n\
If you wish to restore your account, simply log in with your email and password within 90 days.\n\n\
If you did not perform this action, please contact us immediately at:\n\
support@photlas.jp

# Account deletion confirmation HYBRID (password user + OAuth linked)
email.accountDeletion.hybrid.subject=[Photlas] Account Deletion Confirmation
email.accountDeletion.hybrid.body=\
Hi {0},\n\n\
Your account has been deleted.\n\n\
Your data will be retained for 90 days. After that, all data will be permanently deleted.\n\n\
If you wish to restore your account, sign in with your email and password, or sign in with {1} within 90 days.\n\n\
If you did not perform this action, please contact us immediately at:\n\
support@photlas.jp

# Account deletion confirmation OAUTH_ONLY (no password, OAuth only)
email.accountDeletion.oauthOnly.subject=[Photlas] Account Deletion Confirmation
email.accountDeletion.oauthOnly.body=\
Hi {0},\n\n\
Your account has been deleted.\n\n\
