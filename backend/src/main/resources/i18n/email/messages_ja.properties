# Photlas メールテンプレート（日本語）
# ベース言語: 既存メール (AuthService 等のインライン文字列) から移植
#
# 重要: MessageFormat の特殊文字エスケープに注意
#   ' (単一引号)    → '' と二重に書く
#   { } (中括弧)    → '{' '}' と引号で囲む

# 共通シグネチャ
email.signature=Photlas\nsupport@photlas.jp

# メール認証リンク (AuthService.sendVerificationEmail)
email.verification.subject=【Photlas】メールアドレスの確認
email.verification.body=\
{0} さん\n\n\
Photlasへのご登録ありがとうございます。\n\
以下のリンクをクリックして、メールアドレスを確認してください。\n\n\
{1}\n\n\
このリンクの有効期限は24時間です。\n\n\
このメールに心当たりがない場合は、このメールを無視してください。
