# Photlas メールテンプレート（日本語）
# ベース言語: 既存メール (AuthService 等のインライン文字列) から移植
#
# 重要: MessageFormat の特殊文字エスケープに注意
#   ' (単一引号)    → '' と二重に書く
#   { } (中括弧)    → '{' '}' と引号で囲む

# 共通シグネチャ
email.signature=Photlas\nsupport@photlas.jp

# メール認証リンク (AuthService.sendVerificationEmail)
email.verification.subject=【Photlas】メールアドレスの確認
email.verification.body=\
{0} さん\n\n\
Photlasへのご登録ありがとうございます。\n\
以下のリンクをクリックして、メールアドレスを確認してください。\n\n\
{1}\n\n\
このリンクの有効期限は24時間です。\n\n\
このメールに心当たりがない場合は、このメールを無視してください。

# パスワードリセット (PasswordService.sendPasswordResetEmail)
email.passwordReset.subject=【Photlas】パスワードの再設定
email.passwordReset.body=\
パスワード再設定のリクエストを受け付けました。\n\n\
以下のリンクをクリックして、パスワードを再設定してください：\n\
{0}\n\n\
このリンクの有効期限は30分です。\n\n\
このメールに心当たりがない場合は、このメールを無視してください。

# パスワード変更完了通知 (PasswordService.sendPasswordChangedNotification)
email.passwordChanged.subject=【Photlas】パスワードが変更されました
email.passwordChanged.body=\
{0} 様\n\n\
お客様のアカウントのパスワードが変更されました。\n\n\
この変更に心当たりがない場合は、至急以下のメールアドレスまでご連絡ください。\n\
support@photlas.jp

# メールアドレス変更確認リンク (AccountService.requestEmailChange、新アドレス向け)
email.emailChangeConfirm.subject=【Photlas】メールアドレス変更の確認
email.emailChangeConfirm.body=\
{0} さん\n\n\
メールアドレスの変更リクエストを受け付けました。\n\
以下のリンクをクリックして、変更を確定してください：\n\n\
{1}\n\n\
このリンクの有効期限は30分です。\n\n\
このメールに心当たりがない場合は、このメールを無視してください。

# メールアドレス変更通知 (AccountService.requestEmailChange、旧アドレス向け)
email.emailChangeNotifyOld.subject=【Photlas】メールアドレスの変更がリクエストされました
email.emailChangeNotifyOld.body=\
{0} さん\n\n\
お客様のアカウントでメールアドレスの変更がリクエストされました。\n\n\
心当たりがない場合は、ただちにパスワードを変更してください。

# アカウント削除完了通知 NORMAL (パスワード設定済みかつ OAuth 連携なし)
email.accountDeletion.normal.subject=【Photlas】アカウント削除のご確認
email.accountDeletion.normal.body=\
{0} さん\n\n\
アカウントの削除が完了しました。\n\n\
お客様のデータは90日間保持されます。90日経過後、すべてのデータが完全に削除されます。\n\n\
アカウントを復旧したい場合は、90日以内にメールアドレスとパスワードでログインしてください。\n\n\
この操作に心当たりがない場合は、至急以下までご連絡ください。\n\
support@photlas.jp

# アカウント削除完了通知 HYBRID (パスワード設定済み + OAuth 連携あり)
email.accountDeletion.hybrid.subject=【Photlas】アカウント削除のご確認
email.accountDeletion.hybrid.body=\
{0} さん\n\n\
アカウントの削除が完了しました。\n\n\
お客様のデータは90日間保持されます。90日経過後、すべてのデータが完全に削除されます。\n\n\
アカウントを復旧したい場合は、90日以内にメールアドレスとパスワード、または {1} で再度サインインしてください。\n\n\
この操作に心当たりがない場合は、至急以下までご連絡ください。\n\
support@photlas.jp

# アカウント削除完了通知 OAUTH_ONLY (パスワード未設定 + OAuth 連携あり)
email.accountDeletion.oauthOnly.subject=【Photlas】アカウント削除のご確認
email.accountDeletion.oauthOnly.body=\
{0} さん\n\n\
アカウントの削除が完了しました。\n\n\
お客様のデータは90日間保持されます。90日経過後、すべてのデータが完全に削除されます。\n\n\
アカウントを復旧したい場合は、90日以内に {1} で再度サインインしてください。\n\n\
この操作に心当たりがない場合は、至急以下までご連絡ください。\n\
support@photlas.jp
