# Photlas 郵件範本（繁體中文）
# 翻譯來源: Claude (機器翻譯)
# 注意: 未經母語者品質審查。發現誤譯或不自然表達時請直接修改本檔案。
#
# 重要: MessageFormat 特殊字元跳脫
#   ' (單引號)   → 寫成兩個 ''
#   { } (大括號) → 用單引號括起來 '{' '}'

# 共通簽名
email.signature=Photlas 團隊\nsupport@photlas.jp

# 信箱驗證連結 (AuthService.sendVerificationEmail)
email.verification.subject=[Photlas] 驗證電子郵件地址
email.verification.body=\
{0} 您好,\n\n\
感謝您註冊 Photlas!\n\
請點擊以下連結以驗證您的電子郵件地址:\n\n\
{1}\n\n\
此連結將在 24 小時後失效。\n\n\
如果這不是您本人的操作,請忽略此郵件。

# 重設密碼 (PasswordService.sendPasswordResetEmail)
email.passwordReset.subject=[Photlas] 重設密碼
email.passwordReset.body=\
我們已收到您重設密碼的請求。\n\n\
請點擊以下連結以重設您的密碼:\n\
{0}\n\n\
此連結將在 30 分鐘後失效。\n\n\
如果這不是您本人的操作,請忽略此郵件。

# 密碼變更完成通知 (PasswordService.sendPasswordChangedNotification)
email.passwordChanged.subject=[Photlas] 密碼已變更
email.passwordChanged.body=\
{0} 您好,\n\n\
您帳號的密碼已變更。\n\n\
如果這不是您本人的操作,請立即聯絡以下電子郵件:\n\
support@photlas.jp

# 電子郵件變更確認連結 (AccountService.requestEmailChange, 寄送至新地址)
email.emailChangeConfirm.subject=[Photlas] 電子郵件變更確認
email.emailChangeConfirm.body=\
{0} 您好,\n\n\
我們已收到您變更電子郵件地址的請求。\n\
請點擊以下連結以確認變更:\n\n\
{1}\n\n\
此連結將在 30 分鐘後失效。\n\n\
如果這不是您本人的操作,請忽略此郵件。

# 電子郵件變更通知 (AccountService.requestEmailChange, 寄送至舊地址)
email.emailChangeNotifyOld.subject=[Photlas] 您的電子郵件變更已被請求
email.emailChangeNotifyOld.body=\
{0} 您好,\n\n\
您帳號的電子郵件變更已被請求。\n\n\
如果這不是您本人的操作,請立即變更密碼。

# 帳號刪除確認通知 NORMAL (已設定密碼且無 OAuth 連結)
email.accountDeletion.normal.subject=[Photlas] 帳號刪除確認
email.accountDeletion.normal.body=\
{0} 您好,\n\n\
帳號刪除已完成。\n\n\
您的資料將保留 90 天。90 天後所有資料將被永久刪除。\n\n\
如需復原帳號,請在 90 天內使用電子郵件與密碼登入。\n\n\
如果這不是您本人的操作,請立即聯絡以下電子郵件:\n\
support@photlas.jp

# 帳號刪除確認通知 HYBRID (已設定密碼 + OAuth 連結)
email.accountDeletion.hybrid.subject=[Photlas] 帳號刪除確認
email.accountDeletion.hybrid.body=\
{0} 您好,\n\n\
帳號刪除已完成。\n\n\
您的資料將保留 90 天。90 天後所有資料將被永久刪除。\n\n\
如需復原帳號,請在 90 天內使用電子郵件與密碼,或使用 {1} 重新登入。\n\n\
如果這不是您本人的操作,請立即聯絡以下電子郵件:\n\
support@photlas.jp

# 帳號刪除確認通知 OAUTH_ONLY (未設定密碼,僅 OAuth 連結)
email.accountDeletion.oauthOnly.subject=[Photlas] 帳號刪除確認
email.accountDeletion.oauthOnly.body=\
{0} 您好,\n\n\
帳號刪除已完成。\n\n\
您的資料將保留 90 天。90 天後所有資料將被永久刪除。\n\n\
如需復原帳號,請在 90 天內使用 {1} 重新登入。\n\n\
如果這不是您本人的操作,請立即聯絡以下電子郵件:\n\
support@photlas.jp
