# Photlas 郵件範本（繁體中文）
# 翻譯來源: Claude (機器翻譯)
# 注意: 未經母語者品質審查。發現誤譯或不自然表達時請直接修改本檔案。
#
# 重要: MessageFormat 特殊字元跳脫
#   ' (單引號)   → 寫成兩個 ''
#   { } (大括號) → 用單引號括起來 '{' '}'

# 共通簽名
email.signature=Photlas 團隊\nsupport@photlas.jp

# 信箱驗證連結 (AuthService.sendVerificationEmail)
email.verification.subject=[Photlas] 驗證電子郵件地址
email.verification.body=\
{0} 您好,\n\n\
感謝您註冊 Photlas!\n\
請點擊以下連結以驗證您的電子郵件地址:\n\n\
{1}\n\n\
此連結將在 24 小時後失效。\n\n\
如果這不是您本人的操作,請忽略此郵件。

# 重設密碼 (PasswordService.sendPasswordResetEmail)
email.passwordReset.subject=[Photlas] 重設密碼
email.passwordReset.body=\
我們已收到您重設密碼的請求。\n\n\
請點擊以下連結以重設您的密碼:\n\
{0}\n\n\
此連結將在 30 分鐘後失效。\n\n\
如果這不是您本人的操作,請忽略此郵件。

# 密碼變更完成通知 (PasswordService.sendPasswordChangedNotification)
email.passwordChanged.subject=[Photlas] 密碼已變更
email.passwordChanged.body=\
{0} 您好,\n\n\
您帳號的密碼已變更。\n\n\
如果這不是您本人的操作,請立即聯絡以下電子郵件:\n\
support@photlas.jp

# 電子郵件變更確認連結 (AccountService.requestEmailChange, 寄送至新地址)
email.emailChangeConfirm.subject=[Photlas] 電子郵件變更確認
email.emailChangeConfirm.body=\
{0} 您好,\n\n\
我們已收到您變更電子郵件地址的請求。\n\
請點擊以下連結以確認變更:\n\n\
{1}\n\n\
此連結將在 30 分鐘後失效。\n\n\
如果這不是您本人的操作,請忽略此郵件。

# 電子郵件變更通知 (AccountService.requestEmailChange, 寄送至舊地址)
email.emailChangeNotifyOld.subject=[Photlas] 您的電子郵件變更已被請求
email.emailChangeNotifyOld.body=\
{0} 您好,\n\n\
您帳號的電子郵件變更已被請求。\n\n\
如果這不是您本人的操作,請立即變更密碼。

# 帳號刪除確認通知 NORMAL (已設定密碼且無 OAuth 連結)
email.accountDeletion.normal.subject=[Photlas] 帳號刪除確認
email.accountDeletion.normal.body=\
{0} 您好,\n\n\
帳號刪除已完成。\n\n\
您的資料將保留 90 天。90 天後所有資料將被永久刪除。\n\n\
如需復原帳號,請在 90 天內使用電子郵件與密碼登入。\n\n\
如果這不是您本人的操作,請立即聯絡以下電子郵件:\n\
support@photlas.jp

# 帳號刪除確認通知 HYBRID (已設定密碼 + OAuth 連結)
email.accountDeletion.hybrid.subject=[Photlas] 帳號刪除確認
email.accountDeletion.hybrid.body=\
{0} 您好,\n\n\
帳號刪除已完成。\n\n\
您的資料將保留 90 天。90 天後所有資料將被永久刪除。\n\n\
如需復原帳號,請在 90 天內使用電子郵件與密碼,或使用 {1} 重新登入。\n\n\
如果這不是您本人的操作,請立即聯絡以下電子郵件:\n\
support@photlas.jp

# 帳號刪除確認通知 OAUTH_ONLY (未設定密碼,僅 OAuth 連結)
email.accountDeletion.oauthOnly.subject=[Photlas] 帳號刪除確認
email.accountDeletion.oauthOnly.body=\
{0} 您好,\n\n\
帳號刪除已完成。\n\n\
您的資料將保留 90 天。90 天後所有資料將被永久刪除。\n\n\
如需復原帳號,請在 90 天內使用 {1} 重新登入。\n\n\
如果這不是您本人的操作,請立即聯絡以下電子郵件:\n\
support@photlas.jp

# 照片隔離通知 (ModerationNotificationService.sendQuarantineNotification)
# {0}=username, {1}=createdAt
email.moderationQuarantine.subject=[Photlas] 關於您的投稿審查
email.moderationQuarantine.body=\
{0} 您好,\n\n\
您發布的照片({1} 投稿)被判定需要根據內容政策進行審查。\n\n\
目前營運團隊正在確認中。審查結果若無問題,將會自動公開。\n\n\
審查通常需要 1~2 個工作日。\n\
如有疑問,請聯絡我們。

# 內容違規警告 (ModerationNotificationService.sendWarningNotification)
# {0}=username, {1}=reason
email.moderationWarning.subject=[Photlas] 內容政策違規警告
email.moderationWarning.body=\
{0} 您好,\n\n\
您發布的內容被判定違反內容政策,相關投稿已被刪除。\n\n\
違規原因: {1}\n\n\
這是警告。如今後多次發生同樣的違規,我們可能會採取暫停發布功能或暫停帳號等措施。\n\n\
關於內容政策的詳細內容,請查看使用條款。

# 發布功能暫停通知 (ModerationNotificationService.sendTemporarySuspensionNotification)
# {0}=username, {1}=reason, {2}=suspendedUntil
email.moderationSuspension.subject=[Photlas] 關於發布功能臨時停用
email.moderationSuspension.body=\
{0} 您好,\n\n\
由於多次違反內容政策,我們已臨時停用了您的發布功能。\n\n\
違規原因: {1}\n\
停用期間: 至 {2}\n\n\
停用期間無法發布照片,但瀏覽等其他功能仍可使用。\n\n\
停用期間結束後,發布功能將自動復原。\n\
如有疑問,請聯絡我們。

# 帳號永久停用通知 (ModerationNotificationService.sendPermanentSuspensionNotification)
# {0}=username, {1}=reason
email.moderationPermanentBan.subject=[Photlas] 關於帳號永久停用
email.moderationPermanentBan.body=\
{0} 您好,\n\n\
由於反覆違反內容政策,我們已永久停用您的帳號。\n\n\
違規原因: {1}\n\n\
該措施將使您今後無法登入本服務以及使用所有功能。\n\
此外,公開中的投稿全部變為非公開。\n\n\
如對該措施有異議,請聯絡 support@photlas.jp。

# 拍攝位置指摘通知 (LocationSuggestionService.sendSuggestionNotification, 致照片發布者)
# {0}=ownerUsername, {1}=reviewLink
email.locationSuggestion.subject=[Photlas] 關於拍攝位置的指摘
email.locationSuggestion.body=\
{0} 您好,\n\n\
有人對您發布的照片提出了拍攝位置指摘。\n\n\
請透過以下連結查看指摘內容並決定接受或拒絕:\n\
{1}

# 拍攝位置指摘被接受通知 (LocationSuggestionService.sendAcceptanceNotification, 致指摘者)
# {0}=photoLink
email.locationSuggestionAccepted.subject=[Photlas] 您的拍攝位置指摘已被接受
email.locationSuggestionAccepted.body=\
拍攝位置指摘已被發布者接受。\n\n\
相關投稿請透過以下連結查看。\n\
{0}\n\n\
感謝您的協助。

# 拍攝位置指摘被拒絕通知 (LocationSuggestionService.sendRejectionNotification, 致指摘者)
email.locationSuggestionRejected.subject=[Photlas] 關於拍攝位置的指摘
email.locationSuggestionRejected.body=\
關於拍攝位置的指摘,發布者未接受您的指摘。
