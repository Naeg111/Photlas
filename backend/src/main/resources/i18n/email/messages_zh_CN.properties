# Photlas 邮件模板（简体中文）
# 翻译来源: Claude (机器翻译)
# 注意: 未经母语者品质审查。发现误译或不自然表达时请直接修改本文件。
#
# 重要: MessageFormat 特殊字符转义
#   ' (单引号)   → 写成两个 ''
#   { } (大括号) → 用单引号括起来 '{' '}'

# 通用签名
email.signature=Photlas 团队\nsupport@photlas.jp

# 邮箱验证链接 (AuthService.sendVerificationEmail)
email.verification.subject=[Photlas] 验证邮箱地址
email.verification.body=\
{0} 您好,\n\n\
感谢您注册 Photlas!\n\
请点击下方链接以验证您的邮箱地址:\n\n\
{1}\n\n\
此链接将在 24 小时后失效。\n\n\
如果这不是您本人的操作,请忽略此邮件。

# 重置密码 (PasswordService.sendPasswordResetEmail)
email.passwordReset.subject=[Photlas] 重置密码
email.passwordReset.body=\
我们已收到您重置密码的请求。\n\n\
请点击下方链接以重置您的密码:\n\
{0}\n\n\
此链接将在 30 分钟后失效。\n\n\
如果这不是您本人的操作,请忽略此邮件。

# 密码变更完成通知 (PasswordService.sendPasswordChangedNotification)
email.passwordChanged.subject=[Photlas] 密码已变更
email.passwordChanged.body=\
{0} 您好,\n\n\
您账号的密码已被变更。\n\n\
如果这不是您本人的操作,请立即联系以下邮箱:\n\
support@photlas.jp

# 邮箱变更确认链接 (AccountService.requestEmailChange, 发送至新地址)
email.emailChangeConfirm.subject=[Photlas] 邮箱变更确认
email.emailChangeConfirm.body=\
{0} 您好,\n\n\
我们已收到您变更邮箱地址的请求。\n\
请点击下方链接以确认变更:\n\n\
{1}\n\n\
此链接将在 30 分钟后失效。\n\n\
如果这不是您本人的操作,请忽略此邮件。

# 邮箱变更通知 (AccountService.requestEmailChange, 发送至旧地址)
email.emailChangeNotifyOld.subject=[Photlas] 您的邮箱变更已被请求
email.emailChangeNotifyOld.body=\
{0} 您好,\n\n\
您账号的邮箱变更已被请求。\n\n\
如果这不是您本人的操作,请立即修改密码。

# 账号删除确认通知 NORMAL (设置了密码且无 OAuth 关联)
email.accountDeletion.normal.subject=[Photlas] 账号删除确认
email.accountDeletion.normal.body=\
{0} 您好,\n\n\
账号删除已完成。\n\n\
您的数据将保留 90 天。90 天后所有数据将被永久删除。\n\n\
如需恢复账号,请在 90 天内使用邮箱与密码登录。\n\n\
如果这不是您本人的操作,请立即联系以下邮箱:\n\
support@photlas.jp

# 账号删除确认通知 HYBRID (设置了密码 + OAuth 关联)
email.accountDeletion.hybrid.subject=[Photlas] 账号删除确认
email.accountDeletion.hybrid.body=\
{0} 您好,\n\n\
账号删除已完成。\n\n\
您的数据将保留 90 天。90 天后所有数据将被永久删除。\n\n\
如需恢复账号,请在 90 天内使用邮箱与密码,或使用 {1} 重新登录。\n\n\
如果这不是您本人的操作,请立即联系以下邮箱:\n\
support@photlas.jp

# 账号删除确认通知 OAUTH_ONLY (未设置密码,仅 OAuth 关联)
email.accountDeletion.oauthOnly.subject=[Photlas] 账号删除确认
email.accountDeletion.oauthOnly.body=\
{0} 您好,\n\n\
账号删除已完成。\n\n\
您的数据将保留 90 天。90 天后所有数据将被永久删除。\n\n\
如需恢复账号,请在 90 天内使用 {1} 重新登录。\n\n\
如果这不是您本人的操作,请立即联系以下邮箱:\n\
support@photlas.jp

# 照片隔离通知 (ModerationNotificationService.sendQuarantineNotification)
# {0}=username, {1}=createdAt
email.moderationQuarantine.subject=[Photlas] 关于您的投稿审核
email.moderationQuarantine.body=\
{0} 您好,\n\n\
您发布的照片({1} 投稿)被判定需要根据内容政策进行审核。\n\n\
目前运营团队正在确认中。审核结果若无问题,将会自动公开。\n\n\
审核通常需要 1~2 个工作日。\n\
如有疑问,请联系我们。

# 内容违规警告 (ModerationNotificationService.sendWarningNotification)
# {0}=username, {1}=reason
email.moderationWarning.subject=[Photlas] 内容政策违规警告
email.moderationWarning.body=\
{0} 您好,\n\n\
您发布的内容被判定违反内容政策,相关投稿已被删除。\n\n\
违规原因: {1}\n\n\
这是警告。如今后多次发生同样的违规,我们可能会采取暂停发布功能或暂停账号等措施。\n\n\
关于内容政策的详细内容,请查看使用条款。

# 发布功能暂停通知 (ModerationNotificationService.sendTemporarySuspensionNotification)
# {0}=username, {1}=reason, {2}=suspendedUntil
email.moderationSuspension.subject=[Photlas] 关于发布功能临时停用
email.moderationSuspension.body=\
{0} 您好,\n\n\
由于多次违反内容政策,我们已临时停用了您的发布功能。\n\n\
违规原因: {1}\n\
停用期间: 至 {2}\n\n\
停用期间无法发布照片,但浏览等其他功能仍可使用。\n\n\
停用期间结束后,发布功能将自动恢复。\n\
如有疑问,请联系我们。

# 账号永久停用通知 (ModerationNotificationService.sendPermanentSuspensionNotification)
# {0}=username, {1}=reason
email.moderationPermanentBan.subject=[Photlas] 关于账号永久停用
email.moderationPermanentBan.body=\
{0} 您好,\n\n\
由于反复违反内容政策,我们已永久停用您的账号。\n\n\
违规原因: {1}\n\n\
该措施将使您今后无法登录本服务以及使用所有功能。\n\
此外,公开中的投稿全部变为非公开。\n\n\
如对该措施有异议,请联系 support@photlas.jp。
