# 本番環境用設定
# PostgreSQL接続設定（環境変数から取得）

# データベース接続設定
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate設定
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway設定（既存DBをV1でベースライン）
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.ignore-migration-patterns=*:missing

# H2コンソールを無効化
spring.h2.console.enabled=false

# ログ設定（本番環境用 - 最小限）
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.photlas=INFO

# セキュリティ設定
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# サーバー設定
server.port=8080
server.servlet.context-path=

# アクチュエータ設定
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# AWS S3設定
aws.s3.bucket-name=${AWS_S3_BUCKET}
aws.s3.region=${AWS_REGION:ap-northeast-1}
aws.s3.cloudfront-domain=${AWS_CLOUDFRONT_DOMAIN:}

# レート制限設定（1分あたり、Issue#95 で sensitive 新設・general 引き上げ）
rate-limit.auth=10
rate-limit.sensitive=3
rate-limit.photo=30
rate-limit.general=80

# メール設定（SES SMTP）
spring.mail.host=${SMTP_HOST:email-smtp.ap-northeast-1.amazonaws.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# モデレーションAPIキー（Lambda→バックエンド認証用）
moderation.api-key=${MODERATION_API_KEY:}

# CORS設定（本番環境）
cors.allowed-origins=https://photlas.jp,https://www.photlas.jp
