# Issue#4: Docker環境用設定
# PostgreSQL接続設定

# データベース接続設定
spring.datasource.url=jdbc:postgresql://db:5432/photlas_dev
spring.datasource.username=photlas_user
spring.datasource.password=photlas_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate設定
# Issue#120: 本番・テスト・ローカルを Flyway+validate に統一（base で flyway.enabled=true）。
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ログ設定
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# セキュリティ設定
# Issue#23: JWT Secretを環境変数から取得（Docker環境では必須）
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# サーバー設定
server.port=8080
server.servlet.context-path=

# アクチュエータ設定
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# E2Eテスト用: レート制限を緩和（Issue#95 で sensitive も追加）
rate-limit.auth=100
rate-limit.sensitive=50
rate-limit.photo=100
rate-limit.general=200