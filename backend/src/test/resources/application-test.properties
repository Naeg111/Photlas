# Issue#120: テスト DB を H2 から PostgreSQL(+PostGIS) に移行
# 接続先（ローカル: docker-compose の db サービス / CI: GitHub Actions のサービスコンテナ）。
# どちらも localhost:5432/photlas_test。環境変数で上書き可能。
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/photlas_test}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:photlas_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:photlas_password}

# JPA/Hibernate Configuration for Testing
# 本番と同じく Flyway でスキーマを構築し、エンティティとの不整合は validate で即検出する。
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.format-sql=false

# Flyway でマイグレーション(V1〜)を毎回適用（base の flyway.enabled=false を上書き）
spring.flyway.enabled=true
# 通常マイグレーションに加え、テスト専用の後処理(参照データのクリーン)を db/testfixture から読む。
# db/testfixture は src/test 配下のため本番 jar には含まれない。
spring.flyway.locations=classpath:db/migration,classpath:db/testfixture

# Issue#120: テストでは Spring が多数の ApplicationContext をキャッシュし、各々が
# コネクションプールを持つ。PostgreSQL の接続上限(max_connections)を超えて
# "too many clients already" になるのを防ぐため、テストのプールは小さく保つ。
# （テストは単一スレッドで実行されるため少数で十分。DB 側は max_connections を引き上げ済み）
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=1

# JWT Configuration for Testing
jwt.secret=testSecretKeytestSecretKeytestSecretKey
jwt.expiration=86400000

# Disable mail for testing
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# AWS S3 Configuration for Testing
aws.s3.bucket-name=test-bucket
aws.s3.region=us-east-1
aws.s3.cloudfront-domain=

# Rate Limiting for Testing (高い値を設定してテスト時のレート制限を回避)
# RateLimitFilterTest では @TestPropertySource で小さい値に上書きする
rate-limit.auth=1000
rate-limit.sensitive=1000
rate-limit.photo=1000
rate-limit.general=1000

# Logging for testing
logging.level.org.springframework.security=ERROR
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.com.photlas=DEBUG

# Issue#81: OAuth access_token 暗号化鍵（テスト用固定値。本番では使用されない）
photlas.oauth.encryption-key-base64=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=

# Issue#81: OAuth2 ログイン機能は test プロファイルでは明示的に無効化
# （OAuth 関連テストは @SpringBootTest(properties="photlas.oauth.enabled=true") で個別に有効化）
photlas.oauth.enabled=false