# Test Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA/Hibernate Configuration for Testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.format-sql=false

# JWT Configuration for Testing
jwt.secret=testSecretKeytestSecretKeytestSecretKey
jwt.expiration=86400000

# Disable mail for testing
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# AWS S3 Configuration for Testing
aws.s3.bucket-name=test-bucket
aws.s3.region=us-east-1
aws.s3.cloudfront-domain=

# Rate Limiting for Testing (高い値を設定してテスト時のレート制限を回避)
# RateLimitFilterTest では @TestPropertySource で小さい値に上書きする
rate-limit.auth=1000
rate-limit.sensitive=1000
rate-limit.photo=1000
rate-limit.general=1000

# Logging for testing
logging.level.org.springframework.security=ERROR
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.com.photlas=DEBUG

# Issue#81: OAuth access_token 暗号化鍵（テスト用固定値。本番では使用されない）
photlas.oauth.encryption-key-base64=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=

# Issue#81: OAuth2 ログイン機能は test プロファイルでは明示的に無効化
# （OAuth 関連テストは @SpringBootTest(properties="photlas.oauth.enabled=true") で個別に有効化）
photlas.oauth.enabled=false