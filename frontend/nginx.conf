# Frontend Nginx Configuration
# Serves React SPA with proper routing

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sitemap proxy to backend
    location = /sitemap.xml {
        proxy_pass http://backend:8080/api/v1/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OGP for social media crawlers on photo-viewer pages
    location ~ ^/photo-viewer/(\d+)$ {
        set $ogp_proxy "";
        if ($http_user_agent ~* "(Twitterbot|facebookexternalhit|Facebot|LinkedInBot|Slackbot|Discordbot|LINE|Googlebot|bingbot)") {
            set $ogp_proxy "1";
        }

        if ($ogp_proxy = "1") {
            proxy_pass http://backend:8080/api/v1/ogp/photo/$1;
            break;
        }

        try_files $uri $uri/ /index.html;
    }

    # SPA routing - return index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
